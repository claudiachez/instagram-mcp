name: Build .mcpb release

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "mcpb/manifest.json"
      - "pyproject.toml"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install mcpb CLI
        run: npm install -g @anthropic-ai/mcpb

      - name: Assemble bundle
        run: |
          mkdir -p bundle/server/lib
          # Install THIS fork's source (not PyPI) + runtime deps, pure-python wheels only
          pip install . --target bundle/server/lib --only-binary :all: || pip install . --target bundle/server/lib
          # Sync manifest default version with the code default
          VERSION=$(grep -oP '"IG_GRAPH_VERSION", "\Kv[0-9]+\.0' src/instagram_mcp/graph.py)
          python3 - "$VERSION" << 'EOF'
          import json, sys
          m = json.load(open("mcpb/manifest.json"))
          m["user_config"]["ig_graph_version"]["default"] = sys.argv[1]
          json.dump(m, open("bundle/manifest.json", "w"), indent=2)
          EOF

      - name: Pack
        run: mcpb pack bundle instagram-mcp.mcpb

      - name: Publish release with .mcpb attached
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Seconds in the tag avoid collisions when the workflow is re-run within a minute.
          TAG="build-$(date +%Y%m%d-%H%M%S)"
          VERSION="$(grep -oP '"IG_GRAPH_VERSION", "\Kv[0-9]+\.0' src/instagram_mcp/graph.py | head -1)"
          NOTES="Drag instagram-mcp.mcpb into Claude Desktop → Settings → Extensions to update. Default Graph API version: ${VERSION}"
          # Retry: gh release create hits the GitHub API, which can 503 during incidents.
          for attempt in 1 2 3 4 5; do
            if gh release create "$TAG" instagram-mcp.mcpb --title "Instagram MCP $TAG" --notes "$NOTES"; then
              echo "released $TAG"; exit 0
            fi
            echo "release attempt $attempt failed (transient GitHub API?); retrying in 30s…"
            sleep 30
          done
          echo "::error::gh release create failed after 5 attempts — likely a GitHub API incident, re-run later"
          exit 1
